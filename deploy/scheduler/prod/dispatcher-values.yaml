# Schedule Dispatcher - Production
# Evaluates cron schedules every minute and dispatches matching workflows to SQS
#
# This is a long-running service that:
# 1. Runs every minute via setInterval
# 2. Fetches enabled schedules from KeeperHub API
# 3. Evaluates cron expressions against current time
# 4. Sends matching schedules to SQS queue for execution

replicaCount: 1

service:
  enabled: true
  name: keeperhub-scheduler-prod
  type: ClusterIP
  port: 3000
  containerPort: 3000
  tls:
    enabled: false

ingress:
  enabled: false

image:
  repository: ${ECR_REGISTRY}/keeperhub-scheduler-prod
  tag: dispatcher-${IMAGE_TAG}
  pullPolicy: Always

deployment:
  enabled: true

# Use the same service account as main app
serviceAccount:
  create: false
  name: keeperhub-prod

podAnnotations:
  reloader.stakater.com/auto: "true"

resources:
  limits:
    memory: 256Mi
    cpu: 200m
  requests:
    cpu: 50m
    memory: 128Mi

command: ["/bin/sh"]
args:
  - "-c"
  - |
    echo "$(date) - [Dispatcher] Starting..."
    tsx schedule-dispatcher/index.ts

env:
  # KeeperHub API connection
  KEEPERHUB_API_URL:
    type: kv
    value: "http://keeperhub-common:3000"
  KEEPERHUB_API_KEY:
    type: parameterStore
    name: scheduler-service-api-key
    parameter_name: /eks/techops-prod/keeperhub-scheduler/keeperhub-api-key
  # AWS/SQS configuration
  AWS_REGION:
    type: kv
    value: "us-east-2"
  SQS_QUEUE_URL:
    type: kv
    value: "https://sqs.us-east-2.amazonaws.com/${AWS_ACCOUNT_ID}/keeperhub-workflow-queue-prod"
  # Health check server port
  HEALTH_PORT:
    type: kv
    value: "3000"

externalSecrets:
  clusterSecretStoreName: techops-prod

# HTTP health probe on port 3000
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
