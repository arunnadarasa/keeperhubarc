# Schedule Executor - Staging
# Polls SQS for scheduled workflow triggers and executes them via KeeperHub API
#
# This is a long-running service that:
# 1. Continuously polls SQS queue (long-polling with 20s wait)
# 2. Validates workflow and schedule status via API
# 3. Creates execution records via API
# 4. Triggers workflow execution via HTTP endpoint
# 5. Updates execution and schedule status via API

replicaCount: 1

service:
  enabled: true
  name: keeperhub-scheduler-executor-staging
  type: ClusterIP
  port: 3000
  containerPort: 3000
  tls:
    enabled: false

ingress:
  enabled: false

image:
  repository: ${ECR_REGISTRY}/keeperhub-scheduler-staging
  tag: executor-${IMAGE_TAG}
  pullPolicy: Always

deployment:
  enabled: true

# Use the same service account as main app
serviceAccount:
  create: false
  name: keeperhub-staging

podAnnotations:
  reloader.stakater.com/auto: "true"

resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    cpu: 50m
    memory: 128Mi

command: ["/bin/sh"]
args:
  - "-c"
  - |
    echo "$(date) - [Executor] Starting..."
    tsx schedule-executor/index.ts

env:
  # KeeperHub API connection
  KEEPERHUB_API_URL:
    type: kv
    value: "http://keeperhub-common:3000"
  KEEPERHUB_API_KEY:
    type: parameterStore
    name: scheduler-service-api-key
    parameter_name: /eks/techops-staging/keeperhub-scheduler/keeperhub-api-key
  # AWS/SQS configuration
  AWS_REGION:
    type: kv
    value: "us-east-1"
  SQS_QUEUE_URL:
    type: kv
    value: "https://sqs.us-east-1.amazonaws.com/${AWS_ACCOUNT_ID}/keeperhub-workflow-queue-staging"
  # Health check server port
  HEALTH_PORT:
    type: kv
    value: "3000"

externalSecrets:
  clusterSecretStoreName: techops-staging

# HTTP health probe on port 3000
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
