    parameter_name: /eks/techops-prod/keeperhub/stripe-price-pro-25k-yearly
  STRIPE_PRICE_PRO_50K_MONTHLY:
    type: parameterStore
    name: stripe-price-pro-50k-monthly
    parameter_name: /eks/techops-prod/keeperhub/stripe-price-pro-50k-monthly
  STRIPE_PRICE_PRO_50K_YEARLY:
    type: parameterStore
    name: stripe-price-pro-50k-yearly
