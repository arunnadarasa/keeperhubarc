  OPENAI_API_KEY:
    type: parameterStore
    name: openai-api-key
    parameter_name: /eks/techops-prod/keeperhub/openai-api-key
  AI_MODEL:
    type: kv
    value: "gpt-4o"
  PARA_API_KEY:
