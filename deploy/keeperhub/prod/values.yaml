    parameter_name: /eks/techops-prod/keeperhub/turnkey-api-private-key
  TURNKEY_ORGANIZATION_ID:
    type: parameterStore
    name: turnkey-organization-id
    parameter_name: /eks/techops-prod/keeperhub/turnkey-organization-id
  WALLET_ENCRYPTION_KEY:
    type: parameterStore
    name: wallet-encryption-key
    parameter_name: /eks/techops-prod/keeperhub/wallet-encryption-key
  INTEGRATION_ENCRYPTION_KEY:
    type: parameterStore
    name: integration-encryption-key
    parameter_name: /eks/techops-prod/keeperhub/integration-encryption-key
  ETHERSCAN_API_KEY:
    type: parameterStore
    name: etherscan-api-key
    parameter_name: /eks/techops-prod/keeperhub/etherscan-api-key
