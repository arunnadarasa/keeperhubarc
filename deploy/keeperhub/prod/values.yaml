    parameter_name: /eks/techops-prod/keeperhub/stripe-price-business-1m-yearly
  STRIPE_PRICE_ENTERPRISE_MONTHLY:
    type: parameterStore
    name: stripe-price-enterprise-monthly
    parameter_name: /eks/techops-prod/keeperhub/stripe-price-enterprise-monthly
  STRIPE_PRICE_ENTERPRISE_YEARLY:
    type: parameterStore
    name: stripe-price-enterprise-yearly
    parameter_name: /eks/techops-prod/keeperhub/stripe-price-enterprise-yearly
  # Gas credit caps per plan (cents, server-only)
