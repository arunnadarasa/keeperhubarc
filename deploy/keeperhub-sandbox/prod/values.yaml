# Helm values for the keeperhub-sandbox-prod release.
# Rendered by the techops-services/common chart (>=0.0.35). Minimal by
# design — no ingress, no cron, no SSL (internal ClusterIP only).
#
# Apply with:
#   helm upgrade --install keeperhub-sandbox-prod \
#     techops-services/common \
#     --namespace keeperhub \
#     -f deploy/keeperhub-sandbox/prod/values.yaml
#
# Then apply the raw SA manifest (chart v0.0.35 does not support
# automountServiceAccountToken at the SA object level nor zero RoleBinding
# SAs; see research/SUMMARY.md §Pre-Execution Blockers):
#   kubectl apply -f deploy/keeperhub-sandbox/prod/sa.yaml
#
# And the Pod-level automount patch (strategic merge against the rendered
# Deployment — needed because the chart does not expose
# automountServiceAccountToken on pod spec either):
#   kubectl -n keeperhub patch deployment keeperhub-sandbox-prod \
#     --patch-file deploy/keeperhub-sandbox/prod/pod-automount-patch.yaml

replicaCount: 2

# Explicit dedicated ServiceAccount. The SA itself is created via
# deploy/keeperhub-sandbox/prod/sa.yaml so we can set
# automountServiceAccountToken: false at the SA object level (which the
# chart does not expose). This block tells the chart to USE the pre-
# created SA and not create its own.
serviceAccount:
  create: false
  name: keeperhub-sandbox-prod

image:
  # Operator publishes the sandbox image to ECR during the initial rollout
  # with: docker build -f sandbox/Dockerfile -t <ECR>/keeperhub-sandbox:<tag> .
  # && docker push. See SUMMARY.md for the one-time image-publish runbook.
  repository: 068992353948.dkr.ecr.us-east-2.amazonaws.com/keeperhub-sandbox
  tag: prod-latest
  pullPolicy: IfNotPresent

service:
  enabled: true
  name: keeperhub-sandbox-prod
  port: 8787
  type: ClusterIP
  containerPort: 8787
  # No TLS terminator — intra-cluster traffic only. Phase 38.x or later can
  # wrap with mTLS via a service mesh if evidence warrants; research/
  # SUMMARY.md notes this as deferred for v1.9.
  tls:
    enabled: false

ingress:
  enabled: false

# Per POD spec resources — conservative to start. Adjust after soak.
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Readiness / liveness from sandbox/src/index.ts GET /healthz.
probes:
  readiness:
    httpGet:
      path: /healthz
      port: 8787
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    httpGet:
      path: /healthz
      port: 8787
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 2
    failureThreshold: 3

# Env vars scoped to the sandbox Pod.
env:
  NODE_ENV:
    type: kv
    value: "production"
  SANDBOX_PORT:
    type: kv
    value: "8787"
  # NOTE: no DATABASE_URL, no AWS_*, no TURNKEY_*, no WALLET_*. Defence in
  # depth for the scrubbed-env threat model: the sandbox Pod's env has
  # nothing interesting even if the Node CHILD_ENV_ALLOWLIST were bypassed.

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# DO NOT add cron.* blocks — sandbox is long-lived HTTP, not batch.
# DO NOT add rbac.* blocks — sandbox needs ZERO Kubernetes API access
# (no RoleBinding anywhere in the cluster targets keeperhub-sandbox-*).
