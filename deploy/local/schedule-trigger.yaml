# Executor Components for KeeperHub (Full K8s Mode)
# Deployed separately from the main app to allow independent scaling
#
# Components:
# 1. ConfigMap with executor environment
# 2. RBAC (ServiceAccount, Role, RoleBinding) for K8s Job creation
# 3. Deployment for executor (polls SQS, runs workflows in-process or K8s Jobs)
#
# Images required:
#   - keeperhub-executor:latest (unified executor)
#   - keeperhub-runner:latest (workflow runner for K8s Jobs)
#
# Build images:
#   make build-scheduler-images
---
# Secret for workflow runner (integration credential decryption)
# For local dev, use a deterministic key. In production, use a proper secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: keeperhub-secrets
  namespace: local
type: Opaque
data:
  # echo -n '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef' | base64
  integration-encryption-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: executor-env
  namespace: local
data:
  AWS_ENDPOINT_URL: "http://localstack:4566"
  AWS_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  SQS_QUEUE_URL: "http://localstack:4566/000000000000/keeperhub-workflow-queue"
  DATABASE_URL: "postgresql://local:local@postgresql:5432/keeperhub"
  KEEPERHUB_API_URL: "http://keeperhub-common:3000"
  KEEPERHUB_API_KEY: "local-scheduler-key-for-dev"
  RUNNER_IMAGE: "keeperhub-runner:latest"
  IMAGE_PULL_POLICY: "Never"
  K8S_NAMESPACE: "local"
  HEALTH_PORT: "3080"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: executor
  namespace: local
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: executor-role
  namespace: local
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: executor-binding
  namespace: local
subjects:
  - kind: ServiceAccount
    name: executor
    namespace: local
roleRef:
  kind: Role
  name: executor-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  namespace: local
  labels:
    app: executor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: executor
  template:
    metadata:
      labels:
        app: executor
    spec:
      serviceAccountName: executor
      containers:
        - name: executor
          image: keeperhub-executor:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: executor-env
          env:
            - name: INTEGRATION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: keeperhub-secrets
                  key: integration-encryption-key
          ports:
            - containerPort: 3080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3080
            initialDelaySeconds: 10
            periodSeconds: 10
