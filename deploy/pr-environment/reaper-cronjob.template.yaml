# Reaper CronJob for PR environments
# Runs every 10 minutes to find and mark stale workflow executions as timed out
# Variables to be replaced: ${PR_NUMBER}
#
# Deploy with:
#   envsubst < deploy/pr-environment/reaper-cronjob.template.yaml | kubectl apply -f -
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reaper-pr-${PR_NUMBER}
  labels:
    app: reaper
    pr: "${PR_NUMBER}"
spec:
  schedule: "*/10 * * * *" # Every 10 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: reaper
        spec:
          serviceAccountName: keeperhub-pr-${PR_NUMBER}
          containers:
            - name: reaper
              image: curlimages/curl:latest
              args:
                - -sS
                - -f
                - -H
                - "X-Service-Key: $(SCHEDULER_SERVICE_API_KEY)"
                - $(REAPER_URL)
              env:
                - name: REAPER_URL
                  value: http://keeperhub-pr-${PR_NUMBER}-common:3000/api/internal/reaper
                - name: SCHEDULER_SERVICE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: scheduler-dispatcher-pr-${PR_NUMBER}-common-scheduler-service-api-key
                      key: scheduler-dispatcher-pr-${PR_NUMBER}-common-scheduler-service-api-key
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "10m"
                limits:
                  memory: "32Mi"
                  cpu: "10m"
          restartPolicy: OnFailure
