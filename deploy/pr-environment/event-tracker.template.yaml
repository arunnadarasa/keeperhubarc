# Event Tracker for PR environments
# Uses pre-built staging image
# Variables to be replaced: ${PR_NUMBER}, ${ECR_REGISTRY}

replicaCount: 1

service:
  enabled: true
  name: event-pr-${PR_NUMBER}
  port: 3000
  type: ClusterIP
  containerPort: 3000
  tls:
    enabled: false

ingress:
  enabled: false

image:
  repository: ${ECR_REGISTRY}/keeperhub-event-staging
  tag: event-latest
  pullPolicy: Always

deployment:
  enabled: true

serviceAccount:
  create: false
  name: keeperhub-pr-${PR_NUMBER}

podAnnotations:
  reloader.stakater.com/auto: "true"

serviceMonitors:
  enabled: false

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi

env:
  NODE_ENV:
    type: kv
    value: "production"
  LOG_LEVEL:
    type: kv
    value: "info"
  KEEPERHUB_API_URL:
    type: kv
    value: "http://keeperhub-pr-${PR_NUMBER}-common:3000"
  KEEPERHUB_API_KEY:
    type: parameterStore
    name: events-service-api-key
    parameter_name: /eks/techops-staging/keeperhub-events/keeperhub-api-key
  REDIS_HOST:
    type: kv
    value: "redis.pr-${PR_NUMBER}.svc.cluster.local"
  REDIS_PORT:
    type: kv
    value: "6379"
  REDIS_PASSWORD:
    type: kv
    value: ""
  JWT_TOKEN_USERNAME:
    type: parameterStore
    name: jwt-token-username
    parameter_name: /eks/techops-staging/keeperhub-events/jwt-token-username
  JWT_TOKEN_PASSWORD:
    type: parameterStore
    name: jwt-token-password
    parameter_name: /eks/techops-staging/keeperhub-events/jwt-token-password
  ETHERSCAN_API_KEY:
    type: parameterStore
    name: etherscan-api-key
    parameter_name: /eks/techops-staging/keeperhub/etherscan-api-key
  SQS_QUEUE_URL:
    type: kv
    value: "http://localstack.pr-${PR_NUMBER}.svc.cluster.local:4566/000000000000/keeperhub-workflow-queue"
  AWS_REGION:
    type: kv
    value: "us-east-1"

externalSecrets:
  clusterSecretStoreName: techops-staging

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 30
  exec:
    command:
      - /bin/sh
      - -c
      - "pgrep -f 'src/index.ts' || exit 1"
readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  exec:
    command:
      - /bin/sh
      - -c
      - "pgrep -f 'src/index.ts' || exit 1"
