replicaCount: 1

service:
  enabled: true
  name: keeperhub-event-prod
  port: 3000
  type: ClusterIP
  containerPort: 3000
  tls:
    enabled: false

ingress:
  enabled: false

image:
  repository: ${ECR_REGISTRY}/keeperhub-event-prod
  tag: app-${IMAGE_TAG}
  pullPolicy: Always

deployment:
  enabled: true

serviceAccount:
  create: false
  name: keeperhub-prod

podAnnotations:
  reloader.stakater.com/auto: "true"

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi

env:
  NODE_ENV:
    type: kv
    value: "production"
  LOG_LEVEL:
    type: kv
    value: "info"
  KEEPERHUB_API_URL:
    type: kv
    value: "http://keeperhub-common:3000"
  KEEPERHUB_API_KEY:
    type: parameterStore
    name: keeperhub-api-key
    parameter_name: /eks/techops-prod/keeperhub-events/keeperhub-api-key
  REDIS_HOST:
    type: parameterStore
    name: redis-host
    parameter_name: /eks/techops-prod/keeperhub-events/redis-host
  REDIS_PORT:
    type: parameterStore
    name: redis-port
    parameter_name: /eks/techops-prod/keeperhub-events/redis-port
  REDIS_PASSWORD:
    type: parameterStore
    name: redis-password
    parameter_name: /eks/techops-prod/keeperhub-events/redis-password
  JWT_TOKEN_USERNAME:
    type: parameterStore
    name: jwt-token-username
    parameter_name: /eks/techops-prod/keeperhub-events/jwt-token-username
  JWT_TOKEN_PASSWORD:
    type: parameterStore
    name: jwt-token-password
    parameter_name: /eks/techops-prod/keeperhub-events/jwt-token-password
  ETHERSCAN_API_KEY:
    type: parameterStore
    name: etherscan-api-key
    parameter_name: /eks/techops-prod/keeperhub/etherscan-api-key
  SQS_QUEUE_URL:
    type: kv
    value: "https://sqs.us-east-2.amazonaws.com/${AWS_ACCOUNT_ID}/keeperhub-workflow-queue-prod"
  AWS_REGION:
    type: kv
    value: "us-east-2"

externalSecrets:
  clusterSecretStoreName: techops-prod

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 30
  exec:
    command:
      - /bin/sh
      - -c
      - "pgrep -f 'src/index.ts' || exit 1"
readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  exec:
    command:
      - /bin/sh
      - -c
      - "pgrep -f 'src/index.ts' || exit 1"
