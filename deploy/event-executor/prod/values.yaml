replicaCount: 0

service:
  enabled: true
  name: event-executor-prod
  port: 3070
  type: ClusterIP
  containerPort: 3070
  tls:
    enabled: false

ingress:
  enabled: false

image:
  repository: ${ECR_REGISTRY}/event-executor-prod
  tag: app-${IMAGE_TAG}
  pullPolicy: Always

deployment:
  enabled: true

serviceAccount:
  create: false
  name: keeperhub-prod

podAnnotations:
  reloader.stakater.com/auto: "true"

resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    cpu: 50m
    memory: 128Mi

env:
  NODE_ENV:
    type: kv
    value: "production"
  LOG_LEVEL:
    type: kv
    value: "info"
  KEEPERHUB_API_URL:
    type: kv
    value: "http://keeperhub-common:3000"
  KEEPERHUB_API_KEY:
    type: parameterStore
    name: keeperhub-api-key
    parameter_name: /eks/techops-prod/keeperhub-events/keeperhub-api-key
  SQS_QUEUE_URL:
    type: parameterStore
    name: sqs-queue-url
    parameter_name: /eks/techops-prod/keeperhub-events/sqs-queue-url
  AWS_REGION:
    type: kv
    value: "us-east-2"
  HEALTH_PORT:
    type: kv
    value: "3070"

externalSecrets:
  clusterSecretStoreName: techops-prod

command:
  - tsx
  - index.ts

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  httpGet:
    path: /health
    port: 3070
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  httpGet:
    path: /health
    port: 3070
