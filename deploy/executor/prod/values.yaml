# Unified Workflow Executor - Production
# Polls SQS for all trigger types (schedule, block, event) and executes
# workflows either in isolated K8s Jobs or in-process.

replicaCount: 1

service:
  enabled: true
  name: keeperhub-executor-prod
  type: ClusterIP
  port: 3080
  containerPort: 3080
  tls:
    enabled: false

ingress:
  enabled: false

image:
  repository: ${ECR_REGISTRY}/keeperhub-executor-prod
  tag: executor-${IMAGE_TAG}
  pullPolicy: Always

deployment:
  enabled: true

serviceAccount:
  create: false
  name: keeperhub-prod

podAnnotations:
  reloader.stakater.com/auto: "true"

serviceMonitors:
  enabled: true
  monitors:
    - name: executor-metrics
      port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

resources:
  limits:
    memory: 1Gi
    cpu: 500m
  requests:
    cpu: 100m
    memory: 256Mi

command: ["/bin/sh"]
args:
  - "-c"
  - |
    echo "$(date) - [Executor] Starting..."
    tsx keeperhub-executor/index.ts

env:
  DATABASE_URL:
    type: parameterStore
    name: db-url
    parameter_name: /eks/techops-prod/keeperhub/db-url
  INTEGRATION_ENCRYPTION_KEY:
    type: parameterStore
    name: integration-encryption-key
    parameter_name: /eks/techops-prod/keeperhub/integration-encryption-key
  AWS_REGION:
    type: kv
    value: "us-east-2"
  SQS_QUEUE_URL:
    type: kv
    value: "https://sqs.us-east-2.amazonaws.com/${AWS_ACCOUNT_ID}/keeperhub-workflow-queue-prod"
  RUNNER_IMAGE:
    type: kv
    value: "${ECR_REGISTRY}/keeperhub-prod:workflow-runner-${IMAGE_TAG}"
  IMAGE_PULL_POLICY:
    type: kv
    value: "Always"
  K8S_NAMESPACE:
    type: kv
    value: "keeperhub"
  HEALTH_PORT:
    type: kv
    value: "3080"
  JOB_TTL_SECONDS:
    type: kv
    value: "300"
  JOB_ACTIVE_DEADLINE:
    type: kv
    value: "300"
  EXECUTION_MODE:
    type: kv
    value: "isolated"
  METRICS_COLLECTOR:
    type: kv
    value: "prometheus"
  EXECUTOR_METRICS_INGEST_URL:
    type: kv
    value: "http://keeperhub-executor-common:3080"
  METRICS_INGEST_TOKEN:
    type: parameterStore
    name: metrics-ingest-token
    parameter_name: /eks/techops-prod/keeperhub/metrics-ingest-token
  WORKFLOW_RUNNER_COLLECT_MONITORING:
    type: kv
    value: "true"
  PARA_API_KEY:
    type: parameterStore
    name: para-api-key
    parameter_name: /eks/techops-prod/keeperhub/para-api-key
  PARA_ENVIRONMENT:
    type: kv
    value: "prod"
  WALLET_ENCRYPTION_KEY:
    type: parameterStore
    name: wallet-encryption-key
    parameter_name: /eks/techops-prod/keeperhub/wallet-encryption-key
  CHAIN_RPC_CONFIG:
    type: parameterStore
    name: chain-rpc-config
    parameter_name: /eks/techops-prod/keeperhub/chain-rpc-config
  ETHERSCAN_API_KEY:
    type: parameterStore
    name: etherscan-api-key
    parameter_name: /eks/techops-prod/keeperhub/etherscan-api-key
  OPENAI_API_KEY:
    type: parameterStore
    name: openai-api-key
    parameter_name: /eks/techops-prod/keeperhub/openai-api-key
  SENDGRID_API_KEY:
    type: parameterStore
    name: sendgrid-api-key
    parameter_name: /eks/techops-prod/keeperhub/sendgrid-api-key
  FROM_ADDRESS:
    type: kv
    value: "noreply@keeperhub.com"
  # Gas credit caps per plan (cents, server-only)
  GAS_CREDITS_FREE_CENTS:
    type: kv
    value: "100"
  GAS_CREDITS_PRO_CENTS:
    type: kv
    value: "500"
  GAS_CREDITS_BUSINESS_CENTS:
    type: kv
    value: "2500"
  GAS_CREDITS_ENTERPRISE_CENTS:
    type: kv
    value: "10000"
  # Gas Sponsorship (Pimlico EIP-7702)
  PIMLICO_API_KEY:
    type: parameterStore
    name: pimlico-api-key
    parameter_name: /eks/techops-prod/keeperhub/pimlico-api-key
  PIMLICO_BASE_URL:
    type: parameterStore
    name: pimlico-base-url
    parameter_name: /eks/techops-prod/keeperhub/pimlico-base-url
  SIMPLE_ACCOUNT_7702_ADDRESS:
    type: parameterStore
    name: simple-account-7702-address
    parameter_name: /eks/techops-prod/keeperhub/simple-account-7702-address

externalSecrets:
  clusterSecretStoreName: techops-prod

livenessProbe:
  httpGet:
    path: /health
    port: 3080
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3080
  initialDelaySeconds: 10
  periodSeconds: 10
