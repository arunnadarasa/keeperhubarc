on:
  push:
    branches:
      - staging
      - prod
    paths:
      - "keeperhub-events/**"
      - "deploy/sc-event-tracker/**"
      - "deploy/sc-event-worker/**"
      - ".github/workflows/deploy-events.yaml"
  workflow_dispatch:

name: deploy-events

jobs:
  build-and-deploy:
    environment: ${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
    runs-on: ubuntu-latest
    env:
      REGION: ${{ vars.TO_REGION }}
      CLUSTER_NAME: ${{ vars.TO_CLUSTER_NAME }}
      ENVIRONMENT_TAG: ${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
      NAMESPACE: keeperhub
      TRACKER_ECR_NAME: sc-event-tracker-${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
      WORKER_ECR_NAME: sc-event-worker-${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
      TRACKER_HELM_FILE: deploy/sc-event-tracker/${{ github.ref_name == 'prod' && 'prod' || 'staging' }}/values.yaml
      WORKER_HELM_FILE: deploy/sc-event-worker/${{ github.ref_name == 'prod' && 'prod' || 'staging' }}/values.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Check commit message for skip flags
        id: skip
        run: |
          MSG=$(git log -1 --format=%B)
          echo "skip_build=$([[ "$MSG" == *"[skip build]"* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "skip_deploy=$([[ "$MSG" == *"[skip deploy]"* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.TO_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TO_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.skip.outputs.skip_build != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract commit hash
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if events images already exist
        if: steps.skip.outputs.skip_build == 'true'
        id: check-image
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
          for repo in "$TRACKER_ECR_NAME" "$WORKER_ECR_NAME"; do
            if ! aws ecr describe-images \
              --repository-name "$repo" \
              --image-ids "imageTag=app-${IMAGE_TAG}" \
              --region "${{ env.REGION }}" >/dev/null 2>&1; then
              echo "::error::Cannot skip build: app-${IMAGE_TAG} not found in ${repo}. Remove [skip build] or push a build first."
              exit 1
            fi
            echo "app-${IMAGE_TAG} exists in ${repo}"
          done

      - name: Build and push events images
        if: steps.skip.outputs.skip_build != 'true'
        uses: docker/bake-action@v6
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EVENTS_ECR_TRACKER_REPO: ${{ env.TRACKER_ECR_NAME }}
          EVENTS_ECR_WORKER_REPO: ${{ env.WORKER_ECR_NAME }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          ENVIRONMENT_TAG: ${{ env.ENVIRONMENT_TAG }}
        with:
          files: docker-bake.hcl
          targets: events
          push: true

      - name: Replace variables in Helm values files
        if: steps.skip.outputs.skip_deploy != 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          for f in "$TRACKER_HELM_FILE" "$WORKER_HELM_FILE"; do
            sed -i "s|\${ECR_REGISTRY}|${ECR_REGISTRY}|g" "$f"
            sed -i "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" "$f"
          done

      - name: Configure kubectl
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Deploy sc-event-worker
        if: steps.skip.outputs.skip_deploy != 'true'
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          config-files: ${{ env.WORKER_HELM_FILE }}
          chart-path: techops-services/common
          namespace: ${{ env.NAMESPACE }}
          timeout: 5m0s
          name: keeperhub-events-worker
          chart-repository: https://techops-services.github.io/helm-charts
          version: 0.2.1
          atomic: true

      - name: Deploy sc-event-tracker
        if: steps.skip.outputs.skip_deploy != 'true'
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          config-files: ${{ env.TRACKER_HELM_FILE }}
          chart-path: techops-services/common
          namespace: ${{ env.NAMESPACE }}
          timeout: 5m0s
          name: keeperhub-events-tracker
          chart-repository: https://techops-services.github.io/helm-charts
          version: 0.2.1
          atomic: true
