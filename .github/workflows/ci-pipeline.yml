# Type: orchestrator | Coordinates build-images -> e2e-tests -> deploy -> release -> docs-sync
name: CI Pipeline

on:
  push:
    branches: [staging, prod]
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Build Docker images once for push/dispatch events (staging/prod).
  # Outputs image tag and ECR coordinates for downstream jobs.
  # Skipped for PRs -- e2e falls back to bare-metal build.
  build-images:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/build-images.yml
    secrets: inherit

  # Ephemeral e2e tests run on:
  # - Push to staging or prod
  # - PRs with run-e2e-tests-ephemeral label
  # - Manual workflow_dispatch
  e2e-tests:
    needs: [build-images]
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/e2e-tests-ephemeral.yml
    with:
      caller_event: ${{ github.event_name }}
      caller_action: ${{ github.event.action }}
      has_e2e_label: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e-tests-ephemeral') || false }}
      label_name: ${{ github.event.label.name || '' }}
      image_tag: ${{ needs.build-images.outputs.image_tag || '' }}
      ecr_registry: ${{ needs.build-images.outputs.ecr_registry || '' }}
      ecr_repo: ${{ needs.build-images.outputs.ecr_repo || '' }}
      ecr_region: ${{ needs.build-images.outputs.ecr_region || '' }}
    secrets: inherit

  # Deploy runs after build-images and e2e-tests.
  # Blocked if e2e tests fail — no deployment without passing tests.
  deploy:
    needs: [build-images, e2e-tests]
    if: ${{ github.event_name != 'pull_request' && !failure() && !cancelled() }}
    uses: ./.github/workflows/deploy-keeperhub.yaml
    with:
      image_tag: ${{ needs.build-images.outputs.image_tag }}
    secrets: inherit

  # Release and docs-sync only run on prod pushes, after successful deploy.
  # Previously a separate workflow — moved here so e2e/deploy failures block release.
  # Note: if ENABLE_E2E_EPHEMERAL_TESTS is false, e2e jobs are skipped (not failed),
  # so deploy and release proceed unconditionally — the variable is the kill switch.
  release:
    needs: [deploy]
    if: ${{ github.ref_name == 'prod' && !failure() && !cancelled() }}
    uses: ./.github/workflows/release.yml
    secrets: inherit

  docs-sync:
    needs: [release]
    if: ${{ github.ref_name == 'prod' && !failure() && !cancelled() }}
    uses: ./.github/workflows/docs-sync.yml
    secrets: inherit
