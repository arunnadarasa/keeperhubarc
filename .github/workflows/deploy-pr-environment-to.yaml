name: Deploy PR Environment (TechOps)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - staging

jobs:
  check-labels:
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
    steps:
      - name: Checkout code (for change detection)
        if: github.event.action == 'synchronize'
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Determine what to run based on trigger
        id: check
        run: |
          echo "should-deploy=false" >> $GITHUB_OUTPUT

          HAS_DEPLOY_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'deploy-pr-environment') }}"
          ACTION="${{ github.event.action }}"
          ADDED_LABEL="${{ github.event.label.name }}"

          if [[ "$ACTION" == "labeled" ]]; then
            if [[ "$ADDED_LABEL" == "deploy-pr-environment" ]]; then
              echo "should-deploy=true" >> $GITHUB_OUTPUT
            fi
          elif [[ "$ACTION" == "synchronize" || "$ACTION" == "opened" || "$ACTION" == "reopened" ]]; then
            NEEDS_DEPLOY=true

            if [[ "$ACTION" == "synchronize" ]]; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
              if [ -n "$CHANGED" ]; then
                NON_CI_TEST_FILES=$(echo "$CHANGED" | grep -vE '^(\.github/|tests/|playwright\.config|vitest\.config)' || true)
                if [ -z "$NON_CI_TEST_FILES" ]; then
                  echo "Only CI/test files changed -- skipping deploy"
                  NEEDS_DEPLOY=false
                fi
              fi
            fi

            if [[ "$HAS_DEPLOY_LABEL" == "true" && "$NEEDS_DEPLOY" == "true" ]]; then
              echo "should-deploy=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-images:
    needs: check-labels
    if: needs.check-labels.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: true
      matrix:
        image:
          - name: app
            target: runner
            tag_prefix: app
            build_args: true
            cache_key: cache-app
          - name: migrator
            target: migrator
            tag_prefix: migrator
            build_args: false
            cache_key: cache-migrator
          - name: scheduler
            target: scheduler
            tag_prefix: scheduler
            build_args: false
            cache_key: cache-scheduler
          - name: workflow-runner
            target: workflow-runner
            tag_prefix: workflow-runner
            build_args: false
            cache_key: cache-workflow-runner
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REGION: us-east-2
      AWS_ECR_NAME: keeperhub-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.TECHOPS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TECHOPS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if image exists
        id: check-image
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
          if aws ecr describe-images \
            --repository-name ${{ env.AWS_ECR_NAME }} \
            --image-ids imageTag=${{ matrix.image.tag_prefix }}-${IMAGE_TAG} \
            --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        if: steps.check-image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.image.target }}
          push: true
          build-args: ${{ matrix.image.build_args == true && format('NEXT_PUBLIC_AUTH_PROVIDERS={0}\nNEXT_PUBLIC_GITHUB_CLIENT_ID={1}\nNEXT_PUBLIC_GOOGLE_CLIENT_ID={2}', vars.NEXT_PUBLIC_AUTH_PROVIDERS, vars.NEXT_PUBLIC_GITHUB_CLIENT_ID, vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID) || '' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.tag_prefix }}-${{ steps.vars.outputs.sha_short }}
          cache-from: |
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:cache-app
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.cache_key }}
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.cache_key }},mode=max

  deploy:
    needs: [check-labels, build-images]
    if: needs.check-labels.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REGION: us-east-2
      CLUSTER_NAME: techops-prod
      NAMESPACE: pr-${{ github.event.pull_request.number }}
      AWS_ECR_NAME: keeperhub-staging
      PG_VERSION: "16"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.KEEPERHUB_SUBMODULE_TOKEN }}
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.TECHOPS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TECHOPS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract commit hash
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push event-tracker image
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
          FULL_TAG="${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:event-tracker-${IMAGE_TAG}"
          if aws ecr describe-images --repository-name ${{ env.AWS_ECR_NAME }} \
            --image-ids imageTag=event-tracker-${IMAGE_TAG} --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "Image already exists, skipping build"
          else
            echo "Building event-tracker..."
            docker buildx build \
              --file keeperhub-events/sc-event-tracker/Dockerfile \
              --push --tag "${FULL_TAG}" \
              keeperhub-events/sc-event-tracker
          fi

      - name: Build and push event-worker image
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
          FULL_TAG="${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:event-worker-${IMAGE_TAG}"
          if aws ecr describe-images --repository-name ${{ env.AWS_ECR_NAME }} \
            --image-ids imageTag=event-worker-${IMAGE_TAG} --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "Image already exists, skipping build"
          else
            echo "Building event-worker..."
            docker buildx build \
              --file keeperhub-events/sc-event-worker/Dockerfile \
              --push --tag "${FULL_TAG}" \
              keeperhub-events/sc-event-worker
          fi

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ env.NAMESPACE }} pr-number=${{ env.PR_NUMBER }} --overwrite

      - name: Generate database password
        id: db-password
        run: |
          if kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            echo "Secret already exists, retrieving existing password"
            DB_PASSWORD=$(kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials -n ${{ env.NAMESPACE }} -o jsonpath='{.data.password}' | base64 -d)
          else
            echo "Generating new password"
            DB_PASSWORD=$(openssl rand -base64 32)
          fi
          echo "::add-mask::$DB_PASSWORD"
          echo "password=$DB_PASSWORD" >> $GITHUB_OUTPUT

      - name: Deploy infrastructure (parallel)
        env:
          DB_PASSWORD: ${{ steps.db-password.outputs.password }}
          PG_VERSION: ${{ env.PG_VERSION }}
        run: |
          set -euo pipefail
          LOGDIR=$(mktemp -d)

          # PostgreSQL
          (
            envsubst < deploy/helm/pr-environment/postgres-cluster.template.yaml | kubectl apply -f -
            echo "Waiting for PostgreSQL..."
            kubectl wait --for=condition=ready cluster/keeperhub-pr-${PR_NUMBER}-db \
              -n ${NAMESPACE} --timeout=10m || {
              echo "PostgreSQL failed:"
              kubectl describe cluster keeperhub-pr-${PR_NUMBER}-db -n ${NAMESPACE}
              exit 1
            }
            echo "PostgreSQL ready."
          ) > "${LOGDIR}/postgres.log" 2>&1 &
          PG_PID=$!

          # LocalStack
          (
            kubectl delete job create-sqs-queue -n ${NAMESPACE} --ignore-not-found
            envsubst '$PR_NUMBER' < deploy/helm/pr-environment/localstack.template.yaml | kubectl apply -f -
            echo "Waiting for LocalStack..."
            kubectl wait --for=condition=ready pod -l app=localstack,pr=pr-${PR_NUMBER} \
              -n ${NAMESPACE} --timeout=5m || {
              echo "LocalStack failed:"
              kubectl get pods -l app=localstack -n ${NAMESPACE}
              exit 1
            }
            echo "LocalStack ready."
          ) > "${LOGDIR}/localstack.log" 2>&1 &
          LS_PID=$!

          # Redis
          (
            envsubst '$PR_NUMBER' < deploy/helm/pr-environment/redis.template.yaml | kubectl apply -f -
            echo "Waiting for Redis..."
            kubectl wait --for=condition=ready pod -l app=redis,pr=pr-${PR_NUMBER} \
              -n ${NAMESPACE} --timeout=3m || {
              echo "Redis failed:"
              kubectl get pods -l app=redis -n ${NAMESPACE}
              exit 1
            }
            echo "Redis ready."
          ) > "${LOGDIR}/redis.log" 2>&1 &
          REDIS_PID=$!

          FAILED=0
          for COMPONENT in postgres:$PG_PID localstack:$LS_PID redis:$REDIS_PID; do
            NAME="${COMPONENT%%:*}"
            PID="${COMPONENT##*:}"
            if wait "$PID"; then
              echo "${NAME}: OK"
            else
              echo "=== ${NAME} FAILED ==="
              cat "${LOGDIR}/${NAME}.log"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
          echo "All infrastructure components ready."

      - name: Prepare Helm values
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          DB_PASSWORD: ${{ steps.db-password.outputs.password }}
          SERVICE_ACCOUNT_ROLE_ARN: ${{ vars.TECHOPS_SERVICE_ACCOUNT_ROLE_ARN }}
          TEST_PARA_USER_SHARE: ${{ secrets.TEST_PARA_USER_SHARE }}
        run: |
          envsubst < deploy/helm/pr-environment/values.template.yaml > ${{ github.workspace }}/values-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/helm/pr-environment/scheduler-dispatcher.template.yaml > ${{ github.workspace }}/scheduler-dispatcher-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/helm/pr-environment/scheduler-executor.template.yaml > ${{ github.workspace }}/scheduler-executor-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/helm/pr-environment/sc-event-tracker.template.yaml > ${{ github.workspace }}/sc-event-tracker-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/helm/pr-environment/sc-event-worker.template.yaml > ${{ github.workspace }}/sc-event-worker-pr-${{ env.PR_NUMBER }}.yaml

      - name: Clean up stale Helm releases
        run: |
          for release in $(helm list -n ${{ env.NAMESPACE }} --pending --failed -q 2>/dev/null); do
            echo "Cleaning up stale release: $release"
            helm uninstall "$release" -n ${{ env.NAMESPACE }} --no-hooks 2>/dev/null || true
          done

      - name: Add Helm repository
        run: |
          helm repo add techops-services https://techops-services.github.io/helm-charts
          helm repo update

      - name: Deploy Keeperhub application with Helm
        run: |
          set -euo pipefail
          helm upgrade --install keeperhub-pr-${PR_NUMBER} \
            techops-services/common \
            -f ${GITHUB_WORKSPACE}/values-pr-${PR_NUMBER}.yaml \
            --namespace "${NAMESPACE}" --timeout 10m0s --atomic --version 0.2.1

      - name: Deploy satellite services (parallel)
        run: |
          set -euo pipefail
          COMMON_ARGS=(--namespace "${NAMESPACE}" --timeout 5m0s --atomic --version 0.2.1)
          LOGDIR=$(mktemp -d)

          (
            helm upgrade --install scheduler-dispatcher-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/scheduler-dispatcher-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/scheduler-dispatcher.log" 2>&1 &
          PID1=$!

          (
            helm upgrade --install scheduler-executor-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/scheduler-executor-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/scheduler-executor.log" 2>&1 &
          PID2=$!

          (
            helm upgrade --install events-worker-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/sc-event-worker-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/events-worker.log" 2>&1 &
          PID3=$!

          (
            helm upgrade --install events-tracker-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/sc-event-tracker-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/events-tracker.log" 2>&1 &
          PID4=$!

          FAILED=0
          for COMPONENT in scheduler-dispatcher:$PID1 scheduler-executor:$PID2 events-worker:$PID3 events-tracker:$PID4; do
            NAME="${COMPONENT%%:*}"
            PID="${COMPONENT##*:}"
            if wait "$PID"; then
              echo "${NAME}: OK"
            else
              echo "=== ${NAME} FAILED ==="
              cat "${LOGDIR}/${NAME}.log"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            helm list -n ${NAMESPACE}
            exit 1
          fi
          echo "All satellite services deployed successfully."

      - name: Get deployment status
        if: always()
        run: |
          echo "=== Deployment Status ==="
          kubectl get all -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Helm Releases ==="
          helm list -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const namespace = 'pr-' + prNumber;
            const url = `https://app-pr-${prNumber}.keeperhub.com`;

            const comment = `## PR Environment Deployed (TechOps)

            Your PR environment has been deployed to the TechOps cluster!

            **Environment Details:**
            - URL: [${url}](${url})
            - Namespace: \`${namespace}\`
            - Cluster: \`techops-prod\`
            - Image Tag: \`${{ steps.vars.outputs.sha_short }}\`

            **Components:**
            - Keeperhub Application
            - PostgreSQL Database (CloudNativePG)
            - LocalStack (SQS emulation)
            - Redis
            - Scheduler Dispatcher
            - Scheduler Executor
            - SC Event Tracker
            - SC Event Worker

            The environment will be automatically cleaned up when this PR is closed or merged.
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const comment = `## PR Environment Deployment Failed (TechOps)

            The PR environment deployment to TechOps cluster encountered an error.

            Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
