# Type: standalone | Builds and deploys docs-site to TechOps EKS cluster
# Runs alongside deploy-docs.yaml (old cluster) -- both triggered on push to staging
name: deploy-keeperhub-docs-to

on:
  push:
    branches:
      - staging
      - KEEP-1188-Deploy-to-our-own-K8s
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - '.github/workflows/deploy-docs-to.yaml'
  workflow_dispatch:

jobs:
  build-and-deploy-docs:
    environment: ${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
    runs-on: ubuntu-latest
    env:
      HELM_FILE: deploy/docs-site/${{ github.ref_name == 'prod' && 'prod' || 'staging' }}/values.yaml
      REGION: ${{ vars.TO_REGION }}
      CLUSTER_NAME: ${{ vars.TO_CLUSTER_NAME }}
      NAMESPACE: keeperhub
      SERVICE_NAME: keeperhub-docs
      AWS_ECR_NAME: keeperhub-docs-${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Check commit message for skip flags
        id: skip
        run: |
          MSG=$(git log -1 --format=%B)
          echo "skip_deploy=$([[ "$MSG" == *"[skip deploy]"* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.TO_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TO_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.skip.outputs.skip_deploy != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract commit hash
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if image already exists
        id: check-image
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
          if aws ecr describe-images \
            --repository-name "${{ env.AWS_ECR_NAME }}" \
            --image-ids "imageTag=${IMAGE_TAG}" \
            --region "${{ env.REGION }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, tag, and push docs image to ECR
        if: steps.skip.outputs.skip_deploy != 'true' && steps.check-image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docs-site/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:cache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:cache,mode=max

      - name: Replace variables in the Helm values file
        if: steps.skip.outputs.skip_deploy != 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          sed -i "s|\${ECR_REGISTRY}|${ECR_REGISTRY}|g" "$HELM_FILE"
          sed -i "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" "$HELM_FILE"

      - name: Configure kubectl
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Ensure namespace exists
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploying Docs to Kubernetes with Helm
        id: deploy
        if: steps.skip.outputs.skip_deploy != 'true'
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          config-files: ${{ env.HELM_FILE }}
          chart-path: techops-services/common
          namespace: ${{ env.NAMESPACE }}
          timeout: 5m0s
          name: ${{ env.SERVICE_NAME }}
          chart-repository: https://techops-services.github.io/helm-charts
          version: 0.2.1
          atomic: true
