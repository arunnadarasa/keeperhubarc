# Type: reusable | Called by ci-pipeline-to.yml
# Pure deployer: expects images to already exist in TechOps ECR (built by build-images-to.yml).
on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Pre-built image tag (short SHA).'
        type: string
        required: false
        default: ''

name: deploy-keeperhub-to
jobs:
  deploy:
    environment: staging
    runs-on: ubuntu-latest
    env:
      HELM_FILE: deploy/helm/staging/keeperhub/values.yaml
      REGION: us-east-2
      CLUSTER_NAME: techops-prod
      NAMESPACE: keeperhub-staging
      SERVICE_NAME: keeperhub
      SERVICE_ACCOUNT_ROLE_ARN: ${{ vars.TECHOPS_SERVICE_ACCOUNT_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Check commit message for skip flags
        id: skip
        run: |
          MSG=$(git log -1 --format=%B)
          echo "skip_deploy=$([[ "$MSG" == *"[skip deploy]"* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.TECHOPS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TECHOPS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract commit hash
        id: vars
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ -n "${INPUT_IMAGE_TAG}" ]]; then
            echo "sha_short=${INPUT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Replace variables in the Helm values file
        id: replace-vars
        if: steps.skip.outputs.skip_deploy != 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          SERVICE_ACCOUNT_ROLE_ARN: ${{ env.SERVICE_ACCOUNT_ROLE_ARN }}
          AWS_ACCOUNT_ID: ${{ vars.TECHOPS_AWS_ACCOUNT_ID }}
        run: |
          sed -i "s|\${ECR_REGISTRY}|${ECR_REGISTRY}|g" "$HELM_FILE"
          sed -i "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" "$HELM_FILE"
          sed -i "s|\${SERVICE_ACCOUNT_ROLE_ARN}|${SERVICE_ACCOUNT_ROLE_ARN}|g" "$HELM_FILE"
          sed -i "s|\${AWS_ACCOUNT_ID}|${AWS_ACCOUNT_ID}|g" "$HELM_FILE"

      - name: Configure kubectl
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Apply RBAC for Job Spawner
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          kubectl apply -f deploy/helm/staging/keeperhub/rbac.yaml

      - name: Deploying Service to Kubernetes with Helm
        id: deploy
        if: steps.skip.outputs.skip_deploy != 'true'
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          config-files: ${{ env.HELM_FILE }}
          chart-path: techops-services/common
          namespace: ${{ env.NAMESPACE }}
          timeout: 5m0s
          name: ${{ env.SERVICE_NAME }}
          chart-repository: https://techops-services.github.io/helm-charts
          version: 0.2.1
          atomic: true

      - name: Deploy satellite services
        if: steps.skip.outputs.skip_deploy != 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          set -euo pipefail

          # Replace variables in satellite values files
          for VALUES_FILE in \
            deploy/helm/staging/sc-event-tracker/values.yaml \
            deploy/helm/staging/sc-event-worker/values.yaml \
            deploy/helm/staging/docs-site/values.yaml; do
            if [ -f "$VALUES_FILE" ]; then
              sed -i "s|\${ECR_REGISTRY}|${ECR_REGISTRY}|g" "$VALUES_FILE"
              sed -i "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" "$VALUES_FILE"
            fi
          done

          helm repo add techops-services https://techops-services.github.io/helm-charts
          helm repo update

          COMMON_ARGS=(--namespace "${NAMESPACE}" --timeout 5m0s --atomic --version 0.2.1)

          # Deploy event tracker
          helm upgrade --install keeperhub-events-tracker \
            techops-services/common \
            -f deploy/helm/staging/sc-event-tracker/values.yaml \
            "${COMMON_ARGS[@]}"

          # Deploy event worker
          helm upgrade --install keeperhub-events-worker \
            techops-services/common \
            -f deploy/helm/staging/sc-event-worker/values.yaml \
            "${COMMON_ARGS[@]}"

          # Deploy docs site
          helm upgrade --install keeperhub-docs \
            techops-services/common \
            -f deploy/helm/staging/docs-site/values.yaml \
            "${COMMON_ARGS[@]}"

          echo "All satellite services deployed successfully."

      - name: Wait for deployment health check
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          echo "Waiting for https://migration-staging.keeperhub.com/api/health to return 200..."
          CURL_ARGS=(-s -o /dev/null -w "%{http_code}")
          if [[ -n "$CF_ACCESS_CLIENT_ID" && -n "$CF_ACCESS_CLIENT_SECRET" ]]; then
            CURL_ARGS+=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          fi
          for i in {1..30}; do
            STATUS=$(curl "${CURL_ARGS[@]}" "https://migration-staging.keeperhub.com/api/health" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Deployment is ready!"
              exit 0
            fi
            echo "Attempt $i/30: got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Deployment did not become ready in time"
          exit 1
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.TECHOPS_CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.TECHOPS_CF_ACCESS_CLIENT_SECRET }}
