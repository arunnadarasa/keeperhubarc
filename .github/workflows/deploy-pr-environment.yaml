name: Deploy PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - staging
      - production

jobs:
  check-labels:
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
      should-test: ${{ steps.check.outputs.should-test }}
    steps:
      - name: Determine what to run based on trigger
        id: check
        run: |
          echo "should-deploy=false" >> $GITHUB_OUTPUT
          echo "should-test=false" >> $GITHUB_OUTPUT

          HAS_DEPLOY_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'deploy-pr-environment') }}"
          HAS_TEST_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'run-e2e-tests-pr-deploy') }}"
          ACTION="${{ github.event.action }}"
          ADDED_LABEL="${{ github.event.label.name }}"

          if [[ "$ACTION" == "labeled" ]]; then
            if [[ "$ADDED_LABEL" == "deploy-pr-environment" ]]; then
              echo "should-deploy=true" >> $GITHUB_OUTPUT
              # Also run tests if test label was already present
              if [[ "$HAS_TEST_LABEL" == "true" ]]; then
                echo "should-test=true" >> $GITHUB_OUTPUT
              fi
            elif [[ "$ADDED_LABEL" == "run-e2e-tests-pr-deploy" ]]; then
              # Only run tests, don't re-deploy
              echo "should-test=true" >> $GITHUB_OUTPUT
            fi
          elif [[ "$ACTION" == "synchronize" || "$ACTION" == "opened" || "$ACTION" == "reopened" ]]; then
            # On new commits or PR open, re-deploy if label present
            if [[ "$HAS_DEPLOY_LABEL" == "true" ]]; then
              echo "should-deploy=true" >> $GITHUB_OUTPUT
            fi
            # Re-test if both labels present
            if [[ "$HAS_DEPLOY_LABEL" == "true" && "$HAS_TEST_LABEL" == "true" ]]; then
              echo "should-test=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-images:
    needs: check-labels
    if: needs.check-labels.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: true
      matrix:
        image:
          - name: app
            target: runner
            tag_prefix: app
            build_args: true
            cache_key: cache-app
          - name: migrator
            target: migrator
            tag_prefix: migrator
            build_args: false
            cache_key: cache-migrator
          - name: scheduler
            target: scheduler
            tag_prefix: scheduler
            build_args: false
            cache_key: cache-scheduler
          - name: workflow-runner
            target: workflow-runner
            tag_prefix: workflow-runner
            build_args: false
            cache_key: cache-workflow-runner
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REGION: us-east-2
      AWS_ECR_NAME: keeperhub-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if image exists
        id: check-image
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
          if aws ecr describe-images \
            --repository-name ${{ env.AWS_ECR_NAME }} \
            --image-ids imageTag=${{ matrix.image.tag_prefix }}-${IMAGE_TAG} \
            --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        if: steps.check-image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.image.target }}
          push: true
          build-args: ${{ matrix.image.build_args == true && format('NEXT_PUBLIC_AUTH_PROVIDERS={0}\nNEXT_PUBLIC_GITHUB_CLIENT_ID={1}\nNEXT_PUBLIC_GOOGLE_CLIENT_ID={2}', vars.NEXT_PUBLIC_AUTH_PROVIDERS, vars.NEXT_PUBLIC_GITHUB_CLIENT_ID, vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID) || '' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.tag_prefix }}-${{ steps.vars.outputs.sha_short }}
          cache-from: |
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:cache-app
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.cache_key }}
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.cache_key }},mode=max

  deploy:
    needs: [check-labels, build-images]
    if: needs.check-labels.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REGION: us-east-2
      CLUSTER_NAME: maker-staging
      NAMESPACE: pr-${{ github.event.pull_request.number }}
      AWS_ECR_NAME: keeperhub-staging
      PG_VERSION: "16"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract commit hash
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ env.NAMESPACE }} pr-number=${{ env.PR_NUMBER }} --overwrite

      - name: Generate database password
        id: db-password
        run: |
          # Check if secret already exists
          if kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            echo "Secret already exists, retrieving existing password"
            DB_PASSWORD=$(kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials -n ${{ env.NAMESPACE }} -o jsonpath='{.data.password}' | base64 -d)
          else
            echo "Generating new password"
            DB_PASSWORD=$(openssl rand -base64 32)
          fi
          echo "::add-mask::$DB_PASSWORD"
          echo "password=$DB_PASSWORD" >> $GITHUB_OUTPUT

      - name: Deploy infrastructure (parallel)
        env:
          DB_PASSWORD: ${{ steps.db-password.outputs.password }}
          PG_VERSION: ${{ env.PG_VERSION }}
        run: |
          set -euo pipefail
          LOGDIR=$(mktemp -d)

          # PostgreSQL
          (
            envsubst < deploy/pr-environment/postgres-cluster.template.yaml | kubectl apply -f -
            echo "Waiting for PostgreSQL..."
            kubectl wait --for=condition=ready cluster/keeperhub-pr-${PR_NUMBER}-db \
              -n ${NAMESPACE} --timeout=10m || {
              echo "PostgreSQL failed:"
              kubectl describe cluster keeperhub-pr-${PR_NUMBER}-db -n ${NAMESPACE}
              exit 1
            }
            echo "PostgreSQL ready."
          ) > "${LOGDIR}/postgres.log" 2>&1 &
          PG_PID=$!

          # LocalStack
          (
            kubectl delete job create-sqs-queue -n ${NAMESPACE} --ignore-not-found
            envsubst '$PR_NUMBER' < deploy/pr-environment/localstack.template.yaml | kubectl apply -f -
            echo "Waiting for LocalStack..."
            kubectl wait --for=condition=ready pod -l app=localstack,pr=pr-${PR_NUMBER} \
              -n ${NAMESPACE} --timeout=5m || {
              echo "LocalStack failed:"
              kubectl get pods -l app=localstack -n ${NAMESPACE}
              exit 1
            }
            echo "LocalStack ready."
          ) > "${LOGDIR}/localstack.log" 2>&1 &
          LS_PID=$!

          # Redis
          (
            envsubst '$PR_NUMBER' < deploy/pr-environment/redis.template.yaml | kubectl apply -f -
            echo "Waiting for Redis..."
            kubectl wait --for=condition=ready pod -l app=redis,pr=pr-${PR_NUMBER} \
              -n ${NAMESPACE} --timeout=3m || {
              echo "Redis failed:"
              kubectl get pods -l app=redis -n ${NAMESPACE}
              exit 1
            }
            echo "Redis ready."
          ) > "${LOGDIR}/redis.log" 2>&1 &
          REDIS_PID=$!

          # Wait for all three, print logs for failures
          FAILED=0
          for COMPONENT in postgres:$PG_PID localstack:$LS_PID redis:$REDIS_PID; do
            NAME="${COMPONENT%%:*}"
            PID="${COMPONENT##*:}"
            if wait "$PID"; then
              echo "${NAME}: OK"
            else
              echo "=== ${NAME} FAILED ==="
              cat "${LOGDIR}/${NAME}.log"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
          echo "All infrastructure components ready."

      - name: Prepare Helm values
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          DB_PASSWORD: ${{ steps.db-password.outputs.password }}
          SERVICE_ACCOUNT_ROLE_ARN: ${{ vars.KEEPERHUB_STAGING_SERVICE_ACCOUNT_ROLE_ARN }}
          TEST_PARA_USER_SHARE: ${{ secrets.TEST_PARA_USER_SHARE }}
        run: |
          envsubst < deploy/pr-environment/values.template.yaml > ${{ github.workspace }}/values-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/scheduler-dispatcher.template.yaml > ${{ github.workspace }}/scheduler-dispatcher-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/scheduler-executor.template.yaml > ${{ github.workspace }}/scheduler-executor-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/sc-event-tracker.template.yaml > ${{ github.workspace }}/sc-event-tracker-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/sc-event-worker.template.yaml > ${{ github.workspace }}/sc-event-worker-pr-${{ env.PR_NUMBER }}.yaml

      - name: Clean up stale Helm releases
        run: |
          for release in $(helm list -n ${{ env.NAMESPACE }} --pending --failed -q 2>/dev/null); do
            echo "Cleaning up stale release: $release"
            helm uninstall "$release" -n ${{ env.NAMESPACE }} --no-hooks 2>/dev/null || true
          done

      - name: Add Helm repository
        run: |
          helm repo add techops-services https://techops-services.github.io/helm-charts
          helm repo update

      - name: Deploy Keeperhub application with Helm
        run: |
          set -euo pipefail
          helm upgrade --install keeperhub-pr-${PR_NUMBER} \
            techops-services/common \
            -f ${GITHUB_WORKSPACE}/values-pr-${PR_NUMBER}.yaml \
            --namespace "${NAMESPACE}" --timeout 10m0s --atomic --version 0.2.1

      - name: Deploy satellite services (parallel)
        run: |
          set -euo pipefail
          COMMON_ARGS=(--namespace "${NAMESPACE}" --timeout 5m0s --atomic --version 0.2.1)
          LOGDIR=$(mktemp -d)

          (
            helm upgrade --install scheduler-dispatcher-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/scheduler-dispatcher-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/scheduler-dispatcher.log" 2>&1 &
          PID1=$!

          (
            helm upgrade --install scheduler-executor-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/scheduler-executor-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/scheduler-executor.log" 2>&1 &
          PID2=$!

          (
            helm upgrade --install events-worker-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/sc-event-worker-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/events-worker.log" 2>&1 &
          PID3=$!

          (
            helm upgrade --install events-tracker-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/sc-event-tracker-pr-${PR_NUMBER}.yaml \
              "${COMMON_ARGS[@]}"
          ) > "${LOGDIR}/events-tracker.log" 2>&1 &
          PID4=$!

          FAILED=0
          for COMPONENT in scheduler-dispatcher:$PID1 scheduler-executor:$PID2 events-worker:$PID3 events-tracker:$PID4; do
            NAME="${COMPONENT%%:*}"
            PID="${COMPONENT##*:}"
            if wait "$PID"; then
              echo "${NAME}: OK"
            else
              echo "=== ${NAME} FAILED ==="
              cat "${LOGDIR}/${NAME}.log"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            helm list -n ${NAMESPACE}
            exit 1
          fi
          echo "All satellite services deployed successfully."

      - name: Get deployment status
        if: always()
        run: |
          echo "=== Deployment Status ==="
          kubectl get all -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Helm Releases ==="
          helm list -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const namespace = 'pr-' + prNumber;
            const url = `https://app-pr-${prNumber}.keeperhub.com`;

            const comment = `## 🚀 PR Environment Deployed

            Your PR environment has been successfully deployed!

            **Environment Details:**
            - 🌐 URL: [${url}](${url})
            - 📦 Namespace: \`${namespace}\`
            - 🏷️ Image Tag: \`${{ steps.vars.outputs.sha_short }}\`
            - 🔢 Commit: \`${{ github.event.pull_request.head.sha }}\`

            **Components:**
            - Keeperhub Application
            - PostgreSQL Database (isolated instance)
            - LocalStack (SQS emulation)
            - Redis (isolated instance)
            - Scheduler Dispatcher (staging image)
            - Scheduler Executor (staging image)
            - SC Event Tracker (staging image)
            - SC Event Worker (staging image)

            The environment will be automatically cleaned up when this PR is closed or merged.
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const comment = `## PR Environment Deployment Failed

            The PR environment deployment encountered an error.

            Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            Common issues:
            - Database initialization timeout
            - Image build failures
            - Resource constraints
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Remote E2E tests against deployed PR environment
  # Runs when: test label just added (deploy skipped), or deploy just completed with test label present
  e2e-vitest-remote:
    needs: [check-labels, deploy]
    if: >-
      always() &&
      needs.check-labels.outputs.should-test == 'true' &&
      (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: staging
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      NAMESPACE: pr-${{ github.event.pull_request.number }}
      REGION: us-east-2
      CLUSTER_NAME: maker-staging
      KEEPERHUB_URL: https://app-pr-${{ github.event.pull_request.number }}.keeperhub.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          discover-plugins: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Port-forward PR database and LocalStack
        run: |
          # Retrieve DB password from K8s secret
          DB_PASSWORD=$(kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials \
            -n ${{ env.NAMESPACE }} -o jsonpath='{.data.password}' | base64 -d)

          # URL-encode the password (handles base64 special chars +/=)
          ENCODED_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${DB_PASSWORD}', safe=''))")

          # Port-forward PostgreSQL (CNPG read-write service)
          kubectl port-forward -n ${{ env.NAMESPACE }} \
            svc/keeperhub-pr-${{ env.PR_NUMBER }}-db-rw 5432:5432 &
          PF_PG_PID=$!

          # Port-forward LocalStack
          kubectl port-forward -n ${{ env.NAMESPACE }} \
            svc/localstack 4566:4566 &
          PF_LS_PID=$!

          # Wait for port-forwards to be ready
          for i in $(seq 1 15); do
            if pg_isready -h localhost -p 5432 -U keeperhub 2>/dev/null; then
              echo "PostgreSQL port-forward ready"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "PostgreSQL port-forward did not become ready"
              exit 1
            fi
            sleep 2
          done

          # Export connection details
          echo "DATABASE_URL=postgresql://keeperhub:${ENCODED_PASSWORD}@localhost:5432/keeperhub" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> $GITHUB_ENV
          echo "PF_PG_PID=$PF_PG_PID" >> $GITHUB_ENV
          echo "PF_LS_PID=$PF_LS_PID" >> $GITHUB_ENV

      - name: Wait for PR environment to be ready
        run: |
          echo "Waiting for ${{ env.KEEPERHUB_URL }}/api/health to return 200..."
          CURL_ARGS=(-s -o /dev/null -w "%{http_code}")
          if [[ -n "$CF_ACCESS_CLIENT_ID" && -n "$CF_ACCESS_CLIENT_SECRET" ]]; then
            CURL_ARGS+=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          fi
          for i in {1..30}; do
            STATUS=$(curl "${CURL_ARGS[@]}" "${{ env.KEEPERHUB_URL }}/api/health" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "PR environment is ready!"
              exit 0
            fi
            echo "Attempt $i/30: got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "PR environment did not become ready in time"
          exit 1
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Run E2E Vitest tests (remote)
        run: >-
          pnpm vitest run tests/e2e/vitest
          --exclude '**/full-pipeline.test.ts'
          --exclude '**/write-contract-workflow.test.ts'
        env:
          KEEPERHUB_URL: ${{ env.KEEPERHUB_URL }}
          WALLET_ENCRYPTION_KEY: ${{ secrets.TEST_WALLET_ENCRYPTION_KEY }}
          PARA_API_KEY: ${{ secrets.TEST_PARA_API_KEY }}
          PARA_ENVIRONMENT: beta
          WORKFLOW_TARGET_WORLD: "@workflow/world-postgres"
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1

      - name: Cleanup port-forwards
        if: always()
        run: |
          kill $PF_PG_PID 2>/dev/null || true
          kill $PF_LS_PID 2>/dev/null || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-e2e-remote-results-pr-${{ env.PR_NUMBER }}
          path: |
            test-results/
            coverage/
          retention-days: 7

  e2e-playwright-remote:
    needs: [check-labels, deploy]
    if: >-
      always() &&
      needs.check-labels.outputs.should-test == 'true' &&
      (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: staging
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      NAMESPACE: pr-${{ github.event.pull_request.number }}
      REGION: us-east-2
      CLUSTER_NAME: maker-staging
      BASE_URL: https://app-pr-${{ github.event.pull_request.number }}.keeperhub.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js, pnpm, and Playwright
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-playwright: "true"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Port-forward PR database
        run: |
          DB_PASSWORD=$(kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials \
            -n ${{ env.NAMESPACE }} -o jsonpath='{.data.password}' | base64 -d)

          ENCODED_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${DB_PASSWORD}', safe=''))")

          kubectl port-forward -n ${{ env.NAMESPACE }} \
            svc/keeperhub-pr-${{ env.PR_NUMBER }}-db-rw 5432:5432 &
          PF_PG_PID=$!

          for i in $(seq 1 15); do
            if pg_isready -h localhost -p 5432 -U keeperhub 2>/dev/null; then
              echo "PostgreSQL port-forward ready"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "PostgreSQL port-forward did not become ready"
              exit 1
            fi
            sleep 2
          done

          echo "DATABASE_URL=postgresql://keeperhub:${ENCODED_PASSWORD}@localhost:5432/keeperhub" >> $GITHUB_ENV
          echo "PF_PG_PID=$PF_PG_PID" >> $GITHUB_ENV

      - name: Wait for PR environment to be ready
        run: |
          echo "Waiting for ${{ env.BASE_URL }}/api/health to return 200..."
          CURL_ARGS=(-s -o /dev/null -w "%{http_code}")
          if [[ -n "$CF_ACCESS_CLIENT_ID" && -n "$CF_ACCESS_CLIENT_SECRET" ]]; then
            CURL_ARGS+=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          fi
          for i in {1..30}; do
            STATUS=$(curl "${CURL_ARGS[@]}" "${{ env.BASE_URL }}/api/health" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "PR environment is ready!"
              exit 0
            fi
            echo "Attempt $i/30: got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "PR environment did not become ready in time"
          exit 1
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Run Playwright tests against deployed environment
        run: pnpm exec playwright test --grep-invert "happy-paths"
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CI: true

      - name: Cleanup port-forwards
        if: always()
        run: |
          kill $PF_PG_PID 2>/dev/null || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-deployed-report-pr-${{ env.PR_NUMBER }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const status = '${{ job.status }}';
            const label = status === 'success' ? 'PASS' : 'FAIL';
            const title = status === 'success' ? 'E2E Remote Tests Passed' : 'E2E Remote Tests Failed';
            const marker = '<!-- e2e-remote-test-result -->';

            const body = [
              marker,
              `## ${label} ${title}`,
              '',
              `**Environment:** [app-pr-${prNumber}.keeperhub.com](https://app-pr-${prNumber}.keeperhub.com)`,
              `**Status:** ${status}`,
              `**Workflow Run:** [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              '',
              status !== 'success' ? 'Check the workflow run for test failure details and screenshots.' : '',
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
