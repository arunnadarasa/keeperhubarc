name: Deploy PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - staging
      - production

jobs:
  check-label:
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.labeled }}
    steps:
      - name: Check for deploy-pr-environment label
        id: check
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'deploy-pr-environment') }}" == "true" ]]; then
            echo "labeled=true" >> $GITHUB_OUTPUT
          else
            echo "labeled=false" >> $GITHUB_OUTPUT
          fi

  build-images:
    needs: check-label
    if: needs.check-label.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: true
      matrix:
        image:
          - name: app
            target: runner
            tag_prefix: app
            build_args: true
            cache_key: cache-app
          - name: migrator
            target: migrator
            tag_prefix: migrator
            build_args: false
            cache_key: cache-migrator
          - name: scheduler
            target: scheduler
            tag_prefix: scheduler
            build_args: false
            cache_key: cache-scheduler
          - name: workflow-runner
            target: workflow-runner
            tag_prefix: workflow-runner
            build_args: false
            cache_key: cache-workflow-runner
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REGION: us-east-2
      AWS_ECR_NAME: keeperhub-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if image exists
        id: check-image
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
          if aws ecr describe-images \
            --repository-name ${{ env.AWS_ECR_NAME }} \
            --image-ids imageTag=${{ matrix.image.tag_prefix }}-${IMAGE_TAG} \
            --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        if: steps.check-image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.image.target }}
          push: true
          build-args: |
            ${{ matrix.image.build_args == true && format('NEXT_PUBLIC_AUTH_PROVIDERS={0}', vars.NEXT_PUBLIC_AUTH_PROVIDERS) || '' }}
            ${{ matrix.image.build_args == true && format('NEXT_PUBLIC_GITHUB_CLIENT_ID={0}', vars.NEXT_PUBLIC_GITHUB_CLIENT_ID) || '' }}
            ${{ matrix.image.build_args == true && format('NEXT_PUBLIC_GOOGLE_CLIENT_ID={0}', vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID) || '' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.tag_prefix }}-${{ steps.vars.outputs.sha_short }}
          cache-from: |
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:cache-app
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.cache_key }}
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_NAME }}:${{ matrix.image.cache_key }},mode=max

  deploy:
    needs: [check-label, build-images]
    if: needs.check-label.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REGION: us-east-2
      CLUSTER_NAME: maker-staging
      NAMESPACE: pr-${{ github.event.pull_request.number }}
      AWS_ECR_NAME: keeperhub-staging
      PG_VERSION: "16"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract commit hash
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ env.NAMESPACE }} pr-number=${{ env.PR_NUMBER }} --overwrite

      - name: Generate database password
        id: db-password
        run: |
          # Check if secret already exists
          if kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            echo "Secret already exists, retrieving existing password"
            DB_PASSWORD=$(kubectl get secret keeperhub-pr-${{ env.PR_NUMBER }}-db-credentials -n ${{ env.NAMESPACE }} -o jsonpath='{.data.password}' | base64 -d)
          else
            echo "Generating new password"
            DB_PASSWORD=$(openssl rand -base64 32)
          fi
          echo "::add-mask::$DB_PASSWORD"
          echo "password=$DB_PASSWORD" >> $GITHUB_OUTPUT

      - name: Deploy infrastructure (parallel)
        env:
          DB_PASSWORD: ${{ steps.db-password.outputs.password }}
          PG_VERSION: ${{ env.PG_VERSION }}
        run: |
          # PostgreSQL
          (
            envsubst < deploy/pr-environment/postgres-cluster.template.yaml | kubectl apply -f -
            echo "Waiting for PostgreSQL..."
            kubectl wait --for=condition=ready cluster/keeperhub-pr-${PR_NUMBER}-db \
              -n ${NAMESPACE} --timeout=10m || {
              echo "PostgreSQL failed:"
              kubectl describe cluster keeperhub-pr-${PR_NUMBER}-db -n ${NAMESPACE}
              exit 1
            }
            echo "PostgreSQL ready."
          ) &
          PG_PID=$!

          # LocalStack
          (
            kubectl delete job create-sqs-queue -n ${NAMESPACE} --ignore-not-found
            envsubst '$PR_NUMBER' < deploy/pr-environment/localstack.template.yaml | kubectl apply -f -
            echo "Waiting for LocalStack..."
            kubectl wait --for=condition=ready pod -l app=localstack,pr=pr-${PR_NUMBER} \
              -n ${NAMESPACE} --timeout=5m || {
              echo "LocalStack failed:"
              kubectl get pods -l app=localstack -n ${NAMESPACE}
              exit 1
            }
            echo "LocalStack ready."
          ) &
          LS_PID=$!

          # Redis
          (
            envsubst '$PR_NUMBER' < deploy/pr-environment/redis.template.yaml | kubectl apply -f -
            echo "Waiting for Redis..."
            kubectl wait --for=condition=ready pod -l app=redis,pr=pr-${PR_NUMBER} \
              -n ${NAMESPACE} --timeout=3m || {
              echo "Redis failed:"
              kubectl get pods -l app=redis -n ${NAMESPACE}
              exit 1
            }
            echo "Redis ready."
          ) &
          REDIS_PID=$!

          # Wait for all three
          FAILED=0
          wait $PG_PID || FAILED=1
          wait $LS_PID || FAILED=1
          wait $REDIS_PID || FAILED=1

          if [ $FAILED -ne 0 ]; then
            echo "One or more infrastructure components failed to deploy."
            exit 1
          fi
          echo "All infrastructure components ready."

      - name: Prepare Helm values
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          DB_PASSWORD: ${{ steps.db-password.outputs.password }}
          SERVICE_ACCOUNT_ROLE_ARN: ${{ vars.KEEPERHUB_STAGING_SERVICE_ACCOUNT_ROLE_ARN }}
        run: |
          envsubst < deploy/pr-environment/values.template.yaml > ${{ github.workspace }}/values-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/scheduler-dispatcher.template.yaml > ${{ github.workspace }}/scheduler-dispatcher-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/scheduler-executor.template.yaml > ${{ github.workspace }}/scheduler-executor-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/sc-event-tracker.template.yaml > ${{ github.workspace }}/sc-event-tracker-pr-${{ env.PR_NUMBER }}.yaml
          envsubst < deploy/pr-environment/sc-event-worker.template.yaml > ${{ github.workspace }}/sc-event-worker-pr-${{ env.PR_NUMBER }}.yaml

      - name: Clean up stale Helm releases
        run: |
          for release in $(helm list -n ${{ env.NAMESPACE }} --pending --failed -q 2>/dev/null); do
            echo "Cleaning up stale release: $release"
            helm uninstall "$release" -n ${{ env.NAMESPACE }} --no-hooks 2>/dev/null || true
          done

      - name: Deploy Keeperhub application with Helm
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.10
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          config-files: ${{ github.workspace }}/values-pr-${{ env.PR_NUMBER }}.yaml
          chart-path: techops-services/common
          namespace: ${{ env.NAMESPACE }}
          timeout: 10m0s
          name: keeperhub-pr-${{ env.PR_NUMBER }}
          chart-repository: https://techops-services.github.io/helm-charts
          version: 0.2.1
          atomic: true

      - name: Deploy satellite services (parallel)
        run: |
          COMMON_ARGS="--namespace ${NAMESPACE} --timeout 5m0s --atomic --version 0.2.1"
          REPO="https://techops-services.github.io/helm-charts"

          helm repo add techops-services ${REPO}
          helm repo update

          (
            echo "Deploying Scheduler Dispatcher..."
            helm upgrade --install scheduler-dispatcher-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/scheduler-dispatcher-pr-${PR_NUMBER}.yaml \
              ${COMMON_ARGS}
            echo "Scheduler Dispatcher deployed."
          ) &
          PID1=$!

          (
            echo "Deploying Scheduler Executor..."
            helm upgrade --install scheduler-executor-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/scheduler-executor-pr-${PR_NUMBER}.yaml \
              ${COMMON_ARGS}
            echo "Scheduler Executor deployed."
          ) &
          PID2=$!

          (
            echo "Deploying SC Event Worker..."
            helm upgrade --install events-worker-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/sc-event-worker-pr-${PR_NUMBER}.yaml \
              ${COMMON_ARGS}
            echo "SC Event Worker deployed."
          ) &
          PID3=$!

          (
            echo "Deploying SC Event Tracker..."
            helm upgrade --install events-tracker-pr-${PR_NUMBER} \
              techops-services/common \
              -f ${GITHUB_WORKSPACE}/sc-event-tracker-pr-${PR_NUMBER}.yaml \
              ${COMMON_ARGS}
            echo "SC Event Tracker deployed."
          ) &
          PID4=$!

          FAILED=0
          for PID in $PID1 $PID2 $PID3 $PID4; do
            wait $PID || FAILED=1
          done

          if [ $FAILED -ne 0 ]; then
            echo "One or more satellite services failed to deploy."
            helm list -n ${NAMESPACE}
            exit 1
          fi
          echo "All satellite services deployed successfully."

      - name: Get deployment status
        if: always()
        run: |
          echo "=== Deployment Status ==="
          kubectl get all -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Helm Releases ==="
          helm list -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const namespace = 'pr-' + prNumber;
            const url = `https://app-pr-${prNumber}.keeperhub.com`;

            const comment = `## 🚀 PR Environment Deployed

            Your PR environment has been successfully deployed!

            **Environment Details:**
            - 🌐 URL: [${url}](${url})
            - 📦 Namespace: \`${namespace}\`
            - 🏷️ Image Tag: \`${{ steps.vars.outputs.sha_short }}\`
            - 🔢 Commit: \`${{ github.event.pull_request.head.sha }}\`

            **Components:**
            - Keeperhub Application
            - PostgreSQL Database (isolated instance)
            - LocalStack (SQS emulation)
            - Redis (isolated instance)
            - Scheduler Dispatcher (staging image)
            - Scheduler Executor (staging image)
            - SC Event Tracker (staging image)
            - SC Event Worker (staging image)

            The environment will be automatically cleaned up when this PR is closed or merged.
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const comment = `## ❌ PR Environment Deployment Failed

            The PR environment deployment encountered an error.

            Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            Common issues:
            - Database initialization timeout
            - Image build failures
            - Resource constraints
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
