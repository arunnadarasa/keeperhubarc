# Type: reusable | Called by ci-pipeline.yml
# Pure deployer: expects images to already exist in ECR (built by build-images.yml).
on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Pre-built image tag (short SHA).'
        type: string
        required: false
        default: ''

name: deploy-keeperhub
jobs:
  deploy:
    environment: ${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
    runs-on: ubuntu-latest
    env:
      HELM_FILE: deploy/keeperhub/${{ vars.TO_HELM_VALUES_DIR }}/values.yaml
      REGION: ${{ vars.TO_REGION }}
      CLUSTER_NAME: ${{ vars.TO_CLUSTER_NAME }}
      NAMESPACE: keeperhub
      SERVICE_NAME: keeperhub
      SERVICE_ACCOUNT_ROLE_ARN: ${{ vars.TO_SERVICE_ACCOUNT_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Check commit message for skip flags
        id: skip
        run: |
          MSG=$(git log -1 --format=%B)
          echo "skip_deploy=$([[ "$MSG" == *"[skip deploy]"* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.TO_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TO_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract commit hash
        id: vars
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ -n "${INPUT_IMAGE_TAG}" ]]; then
            echo "sha_short=${INPUT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Replace variables in the Helm values file
        id: replace-vars
        if: steps.skip.outputs.skip_deploy != 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          SERVICE_ACCOUNT_ROLE_ARN: ${{ env.SERVICE_ACCOUNT_ROLE_ARN }}
          AWS_ACCOUNT_ID: ${{ vars.TO_AWS_ACCOUNT_ID }}
        run: |
          sed -i "s|\${ECR_REGISTRY}|${ECR_REGISTRY}|g" "$HELM_FILE"
          sed -i "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" "$HELM_FILE"
          sed -i "s|\${SERVICE_ACCOUNT_ROLE_ARN}|${SERVICE_ACCOUNT_ROLE_ARN}|g" "$HELM_FILE"
          sed -i "s|\${AWS_ACCOUNT_ID}|${AWS_ACCOUNT_ID}|g" "$HELM_FILE"

      - name: Configure kubectl
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Ensure namespace exists
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply RBAC for Job Spawner
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          kubectl apply -f deploy/keeperhub/${{ vars.TO_HELM_VALUES_DIR }}/rbac.yaml

      - name: Deploying Service to Kubernetes with Helm
        id: deploy
        if: steps.skip.outputs.skip_deploy != 'true'
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          config-files: ${{ env.HELM_FILE }}
          chart-path: techops-services/common
          namespace: ${{ env.NAMESPACE }}
          timeout: 5m0s
          name: ${{ env.SERVICE_NAME }}
          chart-repository: https://techops-services.github.io/helm-charts
          version: 0.2.1
          atomic: true

      - name: Wait for deployment health check
        if: steps.skip.outputs.skip_deploy != 'true'
        run: |
          HEALTH_URL="${{ vars.TO_HEALTH_URL }}/api/health"
          echo "Waiting for ${HEALTH_URL} to return 200..."
          CURL_ARGS=(-s -o /dev/null -w "%{http_code}" -L)
          if [[ -n "$CF_ACCESS_CLIENT_ID" && -n "$CF_ACCESS_CLIENT_SECRET" ]]; then
            CURL_ARGS+=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          fi
          for i in {1..30}; do
            STATUS=$(curl "${CURL_ARGS[@]}" "${HEALTH_URL}" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Deployment is ready!"
              exit 0
            fi
            echo "Attempt $i/30: got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Deployment did not become ready in time"
          exit 1
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.TO_CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.TO_CF_ACCESS_CLIENT_SECRET }}

  # DISABLED: remote E2E tests temporarily disabled while KEEP-1351 stabilises auth/rate-limit infrastructure
  e2e-playwright-remote:
    needs: deploy
    if: ${{ vars.ENABLE_E2E_REMOTE_TESTS == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
    env:
      BASE_URL: ${{ vars.TO_HEALTH_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Node.js, pnpm, and Playwright
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-playwright: "true"

      - name: Fetch TEST_API_KEY from Parameter Store
        run: |
          TEST_API_KEY=$(aws ssm get-parameter \
            --name "/eks/maker-staging/keeperhub/test-api-key" \
            --with-decryption --query "Parameter.Value" --output text \
            --region us-east-2)
          echo "::add-mask::$TEST_API_KEY"
          echo "TEST_API_KEY=$TEST_API_KEY" >> "$GITHUB_ENV"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TO_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TO_AWS_SECRET_ACCESS_KEY }}

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for ${{ env.BASE_URL }}/api/health to return 200..."
          CURL_ARGS=(-s -o /dev/null -w "%{http_code}" -L)
          if [[ -n "$CF_ACCESS_CLIENT_ID" && -n "$CF_ACCESS_CLIENT_SECRET" ]]; then
            CURL_ARGS+=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          fi
          for i in {1..30}; do
            STATUS=$(curl "${CURL_ARGS[@]}" "${{ env.BASE_URL }}/api/health" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Deployment is ready!"
              exit 0
            fi
            echo "Attempt $i/30: got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Deployment did not become ready in time"
          exit 1
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.TO_CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.TO_CF_ACCESS_CLIENT_SECRET }}

      - name: Run Playwright tests against deployed environment
        run: pnpm exec playwright test --grep-invert "happy-paths"
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_API_KEY: ${{ env.TEST_API_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.TO_CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.TO_CF_ACCESS_CLIENT_SECRET }}
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-remote-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
