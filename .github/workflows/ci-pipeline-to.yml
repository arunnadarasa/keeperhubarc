# Type: orchestrator | Coordinates build-images-to -> deploy-keeperhub-to for TechOps cluster
# Runs alongside ci-pipeline.yml (old cluster) — both triggered on push to staging
name: CI Pipeline (TechOps)

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

jobs:
  build-images:
    uses: ./.github/workflows/build-images-to.yml
    secrets: inherit

  deploy:
    needs: [build-images]
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/deploy-keeperhub-to.yaml
    with:
      image_tag: ${{ needs.build-images.outputs.image_tag }}
    secrets: inherit
