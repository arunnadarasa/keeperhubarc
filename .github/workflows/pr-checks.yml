name: PR Checks

on:
  pull_request:
    branches: ['**']

jobs:
  migrate-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: keeperhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for migration-relevant changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate --per-page 100 -q '.[].filename' | grep -E '^(drizzle/|lib/db/schema)' || true | head -1)
          if [ -n "$CHANGED" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.changes.outputs.relevant == 'true'

      - name: Run workflow engine migrations
        if: steps.changes.outputs.relevant == 'true'
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/keeperhub_test
        run: pnpm db:setup-workflow

      - name: Run app migrations
        if: steps.changes.outputs.relevant == 'true'
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/keeperhub_test
        run: pnpm db:migrate

      - name: Check for snapshot drift
        if: steps.changes.outputs.relevant == 'true'
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/keeperhub_test
        run: |
          npx drizzle-kit generate 2>&1 | tee /tmp/drizzle-generate-output.txt
          if ! grep -q "nothing to migrate" /tmp/drizzle-generate-output.txt; then
            echo "::error::Schema drift detected - run 'pnpm drizzle-kit generate' locally and commit the result."
            exit 1
          fi

      - name: Upload drizzle output on failure
        if: failure() && steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drizzle-generate-output
          path: /tmp/drizzle-generate-output.txt
          retention-days: 7

  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate plugin registry
        run: pnpm discover-plugins

      - name: Cache TypeScript build info
        uses: actions/cache@v5
        with:
          path: tsconfig.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-tsbuildinfo-

      - name: Run check
        run: pnpm check

      - name: Run type check
        run: pnpm type-check

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate plugin registry
        run: pnpm discover-plugins

      - name: Run build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration
