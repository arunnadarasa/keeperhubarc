# Type: standalone | Manual deploy of Prometheus Pushgateway.
# Deploys the prometheus-community/prometheus-pushgateway Helm chart so
# ephemeral workflow-runner Jobs can push metrics before exiting.
# Pushgateway is stateless and rarely changes - run on demand.
on:
  workflow_dispatch: {}
  workflow_call: {}

name: deploy-pushgateway

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-pushgateway-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    environment: ${{ github.ref_name == 'prod' && 'prod' || 'staging' }}
    runs-on: ubuntu-latest
    env:
      REGION: ${{ vars.TO_REGION }}
      CLUSTER_NAME: ${{ vars.TO_CLUSTER_NAME }}
      NAMESPACE: keeperhub
      HELM_FILE: deploy/pushgateway/${{ github.ref_name == 'prod' && 'prod' || 'staging' }}/values.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.TO_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TO_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Pushgateway
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          config-files: ${{ env.HELM_FILE }}
          chart-path: prometheus-community/prometheus-pushgateway
          namespace: ${{ env.NAMESPACE }}
          timeout: 5m0s
          name: keeperhub-pushgateway
          chart-repository: https://prometheus-community.github.io/helm-charts
          version: 2.15.0
          atomic: true
