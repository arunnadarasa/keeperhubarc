# Type: orchestrator | Coordinates release -> docs-sync
name: Release Pipeline

on:
  push:
    branches: [prod]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    secrets: inherit

  docs-sync:
    needs: release
    uses: ./.github/workflows/docs-sync.yml
    secrets: inherit
