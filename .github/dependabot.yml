version: 2
# Sub-services with their own lockfiles need explicit entries.
# keeperhub-executor has no lockfile (part of root workspace) so "/" covers it.
# Groups are split by applies-to. The security-patches group bundles routine
# security minor and patch updates (e.g. a transitive dompurify 3.3.x to 3.4.0
# bump) into one weekly PR. Security majors and any version-update majors fall
# outside the group and open as individual PRs, which preserves an accurate
# one-bump-one-title relationship for the higher-risk changes.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "staging"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      security-patches:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/keeperhub-events"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "staging"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      security-patches:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/keeperhub-scheduler"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "staging"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      security-patches:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/docs-site"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "staging"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      security-patches:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "staging"
    groups:
      all-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
