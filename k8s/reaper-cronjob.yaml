---
# Reaper CronJob
# Runs every 10 minutes to find and mark stale workflow executions as timed out
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reaper
  namespace: keeperhub
spec:
  schedule: "*/10 * * * *" # Every 10 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: reaper
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -sS -f -H "X-Service-Key: $SCHEDULER_SERVICE_API_KEY" \
                    http://keeperhub-common:3000/api/internal/reaper
              env:
                - name: SCHEDULER_SERVICE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: keeperhub-secrets
                      key: scheduler-service-api-key
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "10m"
                limits:
                  memory: "32Mi"
                  cpu: "10m"
          restartPolicy: OnFailure
      backoffLimit: 2
