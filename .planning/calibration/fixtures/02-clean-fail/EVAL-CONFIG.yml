# CALIBRATION ONLY -- not runnable. Synthetic paths for evaluator regression testing.
# Fixture 02: clean-fail
# Scenario: All 3 autonomous criteria fail. Evaluator must write approved: false and populate gaps.

threshold: 0.85
max_rounds: 3
server_port: 3099

seed_scripts:
  - scripts/evaluate/fixtures/hypothetical-seed.ts

criteria:
  - id: API-01
    type: api_assertion
    description: "GET /api/hypothetical returns 201 with id field"
    method: GET
    url: "/api/hypothetical"
    body: null
    auth: "test-user"
    expected_status: 201
    expected_body_contains: "id"

  - id: UI-01
    type: ui_behavior
    description: "Hypothetical modal renders after button click"
    playwright_test: "tests/evaluate/fixtures/hypothetical.test.ts"
    grep_pattern: "modal renders @autonomous"

  - id: DS-01
    type: design_token
    description: "No hardcoded colors in hypothetical modal"
    token_audit: true
    files:
      - components/hypothetical/modal.tsx
