# CALIBRATION ONLY -- not runnable. Synthetic paths for evaluator regression testing.
# Fixture 04: threshold-boundary
# Scenario: 2 of 3 criteria pass at threshold 0.67. 2/3 = 0.666 < 0.67, so approved: false.
# threshold: 0.67 -- boundary test: 2/3 = 0.666 < 0.67, so approved: false. threshold: 0.66 would pass.

threshold: 0.67
max_rounds: 3
server_port: 3099

seed_scripts:
  - scripts/evaluate/fixtures/hypothetical-seed.ts

criteria:
  - id: API-01
    type: api_assertion
    description: "GET /api/health returns 200 with ok field"
    method: GET
    url: "/api/health"
    body: null
    auth: "none"
    expected_status: 200
    expected_body_contains: "ok"

  - id: API-02
    type: api_assertion
    description: "GET /api/hypothetical returns 200"
    method: GET
    url: "/api/hypothetical"
    body: null
    auth: "test-user"
    expected_status: 200

  - id: UI-01
    type: ui_behavior
    description: "Hypothetical feature renders correctly"
    playwright_test: "tests/evaluate/fixtures/hypothetical.test.ts"
    grep_pattern: "feature renders @autonomous"
