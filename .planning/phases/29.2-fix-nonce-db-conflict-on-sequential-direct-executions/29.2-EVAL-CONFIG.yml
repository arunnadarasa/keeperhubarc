# 29.2-EVAL-CONFIG.yml
# Evaluation configuration for Phase 29.2: Fix nonce DB conflict on sequential direct executions
# Written by /build-feature during intake for KEEP-198

threshold: 0.85
max_rounds: 3
server_port: 3099

seed_scripts:
  - tests/e2e/playwright/utils/seed.ts

criteria:
  - id: UNIT-01
    type: unit_test
    description: "check-and-execute routes view/pure action functions through readContractCore instead of writeContractCore"
    test_file: "tests/unit/check-and-execute-routing.test.ts"
    grep_pattern: "view function"

  - id: UNIT-02
    type: unit_test
    description: "write-contract-core generates unique execution IDs when no context executionId is provided"
    test_file: "tests/unit/write-contract-core.test.ts"
    grep_pattern: "unique execution"

  - id: UNIT-03
    type: unit_test
    description: "nonce session accounts for DB pending transactions when determining next nonce"
    test_file: "tests/unit/nonce-manager.test.ts"
    grep_pattern: "pending transactions"

  - id: MANUAL-01
    type: manual_review
    description: "Sequential direct execution calls (transfer then check-and-execute) complete without DB conflicts on a live testnet"
    review_guidance: "Deploy to staging, call execute_transfer on Sepolia, then immediately call execute_check_and_execute on the same wallet+chain. Verify the second call succeeds without pending_transactions conflict errors. Check server logs for nonce session output."
